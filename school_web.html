<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fff;
        }


        .top-bar {
            width: 100%;
            height: 40px;
            background: #004488;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .top-bar-left,
        .top-bar-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .top-item {
            width: 60px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
        }


        .header {
            width: 100%;
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 100px;
            border-bottom: 1px solid #eee;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: #004488;
            border-radius: 50%;
        }

        .logo-text-box {
            width: 220px;
            height: 30px;
            background: #004488;
        }

        .nav {
            display: flex;
            gap: 30px;
        }

        .nav-item {
            width: 80px;
            height: 25px;
            background: #ccc;
        }


        .section-title {
            width: 100%;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .title-icon {
            width: 30px;
            height: 35px;
            background: #004488;
        }

        .title-text {
            width: 150px;
            height: 30px;
            background: #004488;
        }


        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 50px 50px;
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
        }


        .card {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .img-box {
            background: #ddd;
            width: 100%;
        }

        .text-box {
            width: 100%;
            height: 20px;
            background: #eee;
        }


        .card-large {
            width: calc(66.66% - 12.5px);
        }

        .card-medium {
            width: calc(33.33% - 12.5px);
        }

        .card-small {
            width: calc(33.33% - 12.5px);
        }

        .img-large {
            height: 300px;
        }

        .img-medium {
            height: 180px;
        }

        .img-small {
            height: 150px;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="top-bar-left">
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
        </div>
        <div class="top-bar-right">
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
            <div class="top-item"></div>
        </div>
    </div>


    <div class="header">
        <div class="logo">
            <div class="logo-box"></div>
            <div class="logo-text-box"></div>
        </div>
        <div class="nav">
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
            <div class="nav-item"></div>
        </div>
    </div>


    <div class="section-title">
        <div class="title-icon"></div>
        <div class="title-text"></div>
    </div>


    <div class="container">

        <div class="card card-large">
            <div class="img-box img-large"></div>
            <div class="text-box"></div>
        </div>


        <div class="card card-medium">
            <div class="img-box img-medium"></div>
            <div class="text-box"></div>
            <div class="text-box"></div>
            <div class="text-box"></div>
        </div>
        <div class="card card-medium">
            <div class="img-box img-medium" style="background:#c00;"></div>
            <div class="text-box"></div>
            <div class="text-box"></div>
            <div class="text-box"></div>
        </div>


        <div class="card card-small">
            <div class="img-box img-small"></div>
            <div class="text-box"></div>
            <div class="text-box"></div>
        </div>
        <div class="card card-small">
            <div class="img-box img-small"></div>
            <div class="text-box"></div>
            <div class="text-box"></div>
        </div>
        <div class="card card-small">
            <div class="img-box img-small"></div>
            <div class="text-box"></div>
        </div>
    </div>
</body>

</html>
